version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskprio
      POSTGRES_PASSWORD: taskprio_secret
      POSTGRES_DB: taskprio
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskprio"]
      interval: 3s
      timeout: 3s
      retries: 10

  ml-service:
    build: ./ml-service
    ports:
      - "5050:5050"
    environment:
      FLASK_PORT: 5050
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://taskprio:taskprio_secret@postgres:5432/taskprio
      ML_SERVICE_URL: http://ml-service:5050
      NODE_ENV: production
      JWT_ISSUER: taskprio-app
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  pgdata:
